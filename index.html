<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidGo Captain - Fixed</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root { --primary: #FFD700; --dark: #121212; --green: #28a745; --white: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #f0f0f0; }

        header { background: var(--dark); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: var(--primary); }
        #map { height: 350px; width: 100%; border-bottom: 4px solid var(--primary); }

        /* Dashboard Earnings */
        .earnings { display: flex; justify-content: space-around; padding: 10px; background: white; margin-bottom: 5px; }
        .earn-item { text-align: center; }
        .earn-item span { display: block; font-size: 10px; color: #777; }
        .earn-item strong { font-size: 14px; }

        /* Notification Popup */
        #notification-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .request-card { background: white; width: 100%; border-radius: 20px; padding: 20px; text-align: center; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        /* Active Ride Panel */
        #active-panel { background: white; margin: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; }
        .customer-info { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .btn-complete { width: 100%; padding: 15px; background: var(--dark); color: white; border: none; border-radius: 10px; font-weight: bold; }

        /* Slide to Accept */
        .slider-box { width: 100%; height: 60px; background: #f0f0f0; border-radius: 30px; position: relative; margin-top: 20px; overflow: hidden; }
        .slider-text { position: absolute; width: 100%; text-align: center; line-height: 60px; color: #888; font-weight: bold; }
        .slider-handle { width: 60px; height: 100%; background: var(--green); border-radius: 30px; position: absolute; left: 0; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; transition: 0.1s; z-index: 5; }

        footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #ddd; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2513/2513-preview.mp3" loop></audio>

    <header>
        <div><strong>RapidGo Captain</strong><br><small id="cap-id">ID: ...</small></div>
        <div style="background: var(--primary); color: #000; padding: 5px 10px; border-radius: 10px; font-weight: bold;">Online</div>
    </header>

    <div class="earnings">
        <div class="earn-item"><span>Today</span><strong>৳ 450</strong></div>
        <div class="earn-item"><span>Weekly</span><strong>৳ 2800</strong></div>
        <div class="earn-item"><span>Total</span><strong>৳ 15,400</strong></div>
    </div>

    <div id="map"></div>

    <!-- Incoming Request Overlay -->
    <div id="notification-overlay">
        <div class="request-card">
            <h2 style="color: var(--green);">New Ride!</h2>
            <p id="req-pickup" style="margin: 10px 0; font-weight: bold;">Pickup Location...</p>
            <div style="display: flex; justify-content: space-around; margin: 15px 0;">
                <div><span>Dist:</span> <br> <strong id="req-dist">2.5</strong> KM</div>
                <div><span>Fare:</span> <br> <strong id="req-fare">৳ 120</strong></div>
            </div>
            <div class="slider-box" id="slider-box">
                <div class="slider-text">Slide to Accept</div>
                <div id="slider" class="slider-handle"><i class="fas fa-arrow-right"></i></div>
            </div>
        </div>
    </div>

    <!-- Active Ride Info -->
    <div id="active-panel">
        <div class="customer-info">
            <p><strong>Customer:</strong> <span id="cust-name">...</span></p>
            <p><strong>Phone:</strong> <a id="cust-phone" href="#">Call Now</a></p>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span>Fare: ৳ <strong id="active-fare">0</strong></span>
            <span>Distance: <strong id="active-dist">0</strong> KM</span>
        </div>
        <button class="btn-complete" id="btn-finish">COMPLETE RIDE</button>
    </div>

    <div style="height: 100px;"></div>

    <footer>
        <div style="color: var(--primary);"><i class="fas fa-home"></i><p style="font-size: 10px;">Home</p></div>
        <div><i class="fas fa-wallet"></i><p style="font-size: 10px;">Payout</p></div>
        <div><i class="fas fa-user-check"></i><p style="font-size: 10px;">Subscription</p></div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAFUAATQoR0Kidzm9665tILTMNArFgKO9k",
            authDomain: "school-websit-9c152.firebaseapp.com",
            databaseURL: "https://school-websit-9c152-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "school-websit-9c152",
            storageBucket: "school-websit-9c152.firebasestorage.app",
            messagingSenderId: "591107596339",
            appId: "1:591107596339:web:7ea49a657abd08f1f20346"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let map, routingControl;
        let isBusy = false; // এটি ডবল পপআপ আটকাবে
        let currentRideId = null;
        let driverLat, driverLng;
        const appStartTime = Date.now(); // শুধুমাত্র অ্যাপ খোলার পরের রাইড দেখাবে

        // --- 1. Init Map ---
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([23.8103, 90.4125], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            navigator.geolocation.watchPosition((pos) => {
                driverLat = pos.coords.latitude;
                driverLng = pos.coords.longitude;
                updateDriverLocation();
            });
        }
        initMap();

        function updateDriverLocation() {
            if (auth.currentUser) {
                update(ref(db, 'drivers/' + auth.currentUser.uid), {
                    lat: driverLat, lng: driverLng, lastSeen: Date.now()
                });
            }
        }

        // --- 2. Listen for New Rides (Fixed to avoid spam) ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('cap-id').innerText = "ID: " + user.uid.substring(0, 8).toUpperCase();
                
                // শুধুমাত্র নতুন রাইড লিসেন করবে
                const ridesRef = ref(db, 'rides/');
                onChildAdded(ridesRef, (snapshot) => {
                    const ride = snapshot.val();
                    // শর্ত: পেন্ডিং রাইড, ড্রাইভার ফ্রি এবং রাইডটি নতুন হতে হবে
                    if (ride.status === 'pending' && !isBusy && ride.timestamp > appStartTime) {
                        triggerPopup(snapshot.key, ride);
                    }
                });
            }
        });

        function triggerPopup(id, data) {
            currentRideId = id;
            document.getElementById('req-pickup').innerText = data.pickup;
            document.getElementById('req-fare').innerText = "৳ 120"; // ডাইনামিক করা যাবে
            document.getElementById('notification-overlay').style.display = 'flex';
            document.getElementById('alert-sound').play();
        }

        // --- 3. Slide to Accept Logic ---
        const slider = document.getElementById('slider');
        const sliderBox = document.getElementById('slider-box');
        let dragging = false;

        slider.addEventListener('touchstart', () => dragging = true);
        slider.addEventListener('touchmove', (e) => {
            if (!dragging) return;
            let moveX = e.touches[0].clientX - 50;
            if (moveX >= 0 && moveX <= sliderBox.offsetWidth - 60) {
                slider.style.left = moveX + 'px';
            }
            if (moveX >= sliderBox.offsetWidth - 70) {
                acceptRide();
                dragging = false;
            }
        });

        async function acceptRide() {
            isBusy = true; // এখন আর কোনো পপআপ আসবে না
            document.getElementById('alert-sound').pause();
            document.getElementById('notification-overlay').style.display = 'none';

            await update(ref(db, 'rides/' + currentRideId), {
                status: 'accepted',
                driver_id: auth.currentUser.uid,
                driver_phone: "01800000000" // ড্রাইভারের নম্বর
            });

            // কাস্টমার ডাটাবেস থেকে তথ্য আনা (রিয়েল অ্যাপে এটি users নোড থেকে আসবে)
            document.getElementById('cust-name').innerText = "User_" + currentRideId.substring(0,4);
            document.getElementById('cust-phone').innerText = "01700000000";
            document.getElementById('cust-phone').href = "tel:01700000000";
            document.getElementById('active-fare').innerText = "120";
            document.getElementById('active-dist').innerText = "2.5";
            document.getElementById('active-panel').style.display = 'block';

            showDirection();
        }

        // --- 4. Map Direction (Routing) ---
        function showDirection() {
            if (routingControl) map.removeControl(routingControl);
            
            // ডেমো গন্তব্য (বাস্তবে কাস্টমারের ল্যাট-লং ডাটাবেস থেকে আসবে)
            const destLat = driverLat + 0.01;
            const destLng = driverLng + 0.01;

            routingControl = L.Routing.control({
                waypoints: [
                    L.latLng(driverLat, driverLng),
                    L.latLng(destLat, destLng)
                ],
                routeWhileDragging: false,
                createMarker: function() { return null; } // এক্সট্রা মার্কার সরাতে
            }).addTo(map);
        }

        // --- 5. Finish Ride ---
        document.getElementById('btn-finish').onclick = async () => {
            await update(ref(db, 'rides/' + currentRideId), { status: 'completed' });
            alert("Ride Completed Successfully!");
            isBusy = false; // এখন আবার নতুন রাইড রিসিভ করা যাবে
            document.getElementById('active-panel').style.display = 'none';
            if (routingControl) map.removeControl(routingControl);
            slider.style.left = '0px';
        };

    </script>
</body>
                                           </html>

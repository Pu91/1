<script>
            const scriptURL = 'https://script.google.com/macros/s/AKfycby0Xn7kz-2USGyFNpRpdGwWWd6pvbaPWJlvyh6GZEiCpnLsLm-UQ-qke5kJBUf1jZWp/exec'
            const form = document.forms['google-sheet']
          
            form.addEventListener('submit', e => {
              e.preventDefault()
              fetch(scriptURL, { method: 'POST', body: new FormData(form)})

            })

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidGo - Captain Portal</title>
    
    <!-- CSS Dependencies -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root { --primary: #FFD700; --dark: #121212; --green: #28a745; --white: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #f0f0f0; overflow-x: hidden; }

        /* Header & Profile */
        header { background: var(--dark); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: var(--primary); position: sticky; top: 0; z-index: 1000; }
        .captain-id { font-size: 12px; color: #aaa; }
        .profile-icon { width: 35px; height: 35px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #000; }

        /* Earnings Dashboard */
        .earnings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; }
        .earn-card { background: var(--white); padding: 15px 10px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .earn-card h4 { font-size: 11px; color: #666; margin-bottom: 5px; }
        .earn-card p { font-size: 14px; font-weight: bold; color: var(--dark); }

        /* Map Section */
        #map { height: 300px; width: 100%; margin-top: 5px; border-bottom: 3px solid var(--primary); }

        /* Floating Notification Pop-up */
        #notification-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white; padding: 20px;
        }
        .ride-request-card { background: var(--white); color: #000; width: 100%; border-radius: 20px; padding: 20px; text-align: center; }
        
        /* Slide to Accept Button */
        .slide-container {
            width: 100%; height: 60px; background: #eee; border-radius: 30px;
            margin-top: 20px; position: relative; overflow: hidden;
        }
        .slide-text { position: absolute; width: 100%; text-align: center; line-height: 60px; font-weight: bold; color: #888; }
        .slide-handle {
            width: 60px; height: 100%; background: var(--green); border-radius: 30px;
            display: flex; justify-content: center; align-items: center; color: white;
            position: absolute; left: 0; cursor: pointer; z-index: 2; transition: 0.1s;
        }

        /* Post-Accept Details */
        #active-ride-details { background: var(--white); margin: 15px; padding: 20px; border-radius: 15px; display: none; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        /* Footer */
        footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #ddd; }
        .foot-item { text-align: center; font-size: 10px; color: #777; }
        .foot-item i { font-size: 18px; margin-bottom: 3px; }
        .active-nav { color: var(--primary); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Notification Sound -->
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2513/2513-preview.mp3" loop></audio>

    <header>
        <div>
            <div style="font-weight: bold; font-size: 18px;">RapidGo Captain</div>
            <div class="captain-id" id="cap-id">ID: Loading...</div>
        </div>
        <div class="profile-icon"><i class="fas fa-motorcycle"></i></div>
    </header>

    <!-- Earnings Dashboard -->
    <div class="earnings-grid">
        <div class="earn-card"><h4>Today</h4><p>৳ <span id="earn-today">0</span></p></div>
        <div class="earn-card"><h4>Weekly</h4><p>৳ <span id="earn-week">0</span></p></div>
        <div class="earn-card"><h4>Total</h4><p>৳ <span id="earn-total">0</span></p></div>
    </div>

    <!-- Map View -->
    <div id="map"></div>

    <!-- Incoming Ride Notification -->
    <div id="notification-overlay">
        <div class="ride-request-card">
            <h2 style="color: var(--green);">New Ride Request!</h2>
            <hr style="margin:15px 0;">
            <p><strong>Pickup:</strong> <span id="req-pickup">...</span></p>
            <p><strong>Distance:</strong> <span id="req-dist">0</span> KM</p>
            <h3 style="margin-top:10px;">Fare: ৳ <span id="req-fare">0</span></h3>
            
            <div class="slide-container" id="slide-box">
                <div class="slide-text">Slide to Accept</div>
                <div class="slide-handle" id="slider"><i class="fas fa-arrow-right"></i></div>
            </div>
        </div>
    </div>

    <!-- Customer Details (After Accept) -->
    <div id="active-ride-details">
        <h4 style="margin-bottom: 15px; color: var(--green);"><i class="fas fa-check-circle"></i> Ride Accepted</h4>
        <div class="info-row"><span>Customer:</span> <strong id="cust-name">John Doe</strong></div>
        <div class="info-row"><span>Phone:</span> <strong id="cust-phone">017XXXXXXXX</strong></div>
        <div class="info-row"><span>Status:</span> <span style="background:var(--primary); padding:2px 8px; border-radius:5px;">Heading to Pickup</span></div>
        <button id="btn-complete" style="width:100%; padding:12px; background:var(--dark); color:white; border:none; border-radius:10px; margin-top:10px;">Complete Ride</button>
    </div>

    <div style="height: 100px;"></div>

    <footer>
        <div class="foot-item active-nav"><i class="fas fa-home"></i><p>Home</p></div>
        <div class="foot-item"><i class="fas fa-chart-line"></i><p>Earnings</p></div>
        <div class="foot-item"><i class="fas fa-money-check-alt"></i><p>Payout</p></div>
        <div class="foot-item"><i class="fas fa-star"></i><p>Subscription</p></div>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAFUAATQoR0Kidzm9665tILTMNArFgKO9k",
            authDomain: "school-websit-9c152.firebaseapp.com",
            databaseURL: "https://school-websit-9c152-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "school-websit-9c152",
            storageBucket: "school-websit-9c152.firebasestorage.app",
            messagingSenderId: "591107596339",
            appId: "1:591107596339:web:7ea49a657abd08f1f20346"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let map, routingControl;
        let currentRideId = null;
        let driverLat, driverLng;

        // --- 1. Init Map & Location ---
        function initMap() {
            map = L.map('map').setView([23.8103, 90.4125], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            navigator.geolocation.watchPosition((pos) => {
                driverLat = pos.coords.latitude;
                driverLng = pos.coords.longitude;
                L.marker([driverLat, driverLng]).addTo(map).bindPopup("Your Location").openPopup();
                map.setView([driverLat, driverLng]);
            });
        }
        initMap();

        // --- 2. Real-time Ride Listener ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('cap-id').innerText = "ID: " + user.uid.substring(0, 8).toUpperCase();
                listenForRides();
            }
        });

        function listenForRides() {
            const ridesRef = ref(db, 'rides/');
            onValue(ridesRef, (snapshot) => {
                snapshot.forEach((child) => {
                    const ride = child.val();
                    if (ride.status === 'pending') {
                        showNotification(child.key, ride);
                    }
                });
            });
        }

        // --- 3. Notification & Sound ---
        function showNotification(rideId, rideData) {
            currentRideId = rideId;
            document.getElementById('req-pickup').innerText = rideData.pickup;
            document.getElementById('req-dist').innerText = "2.5"; // Calculation logic needed
            document.getElementById('req-fare').innerText = "120"; 
            
            document.getElementById('notification-overlay').style.display = 'flex';
            document.getElementById('notif-sound').play();
        }

        // --- 4. Slide to Accept Logic ---
        const slider = document.getElementById('slider');
        const slideBox = document.getElementById('slide-box');
        let isDragging = false;

        slider.addEventListener('touchstart', (e) => isDragging = true);
        slider.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let x = e.touches[0].clientX - 50; 
            if (x >= 0 && x <= slideBox.offsetWidth - 60) {
                slider.style.left = x + 'px';
            }
            if (x >= slideBox.offsetWidth - 70) {
                acceptRide();
                isDragging = false;
            }
        });

        function acceptRide() {
            update(ref(db, 'rides/' + currentRideId), {
                status: 'accepted',
                driver_id: auth.currentUser.uid
            }).then(() => {
                document.getElementById('notif-sound').pause();
                document.getElementById('notification-overlay').style.display = 'none';
                document.getElementById('active-ride-details').style.display = 'block';
                
                // Show Route on Map (Dummy pickup coords for demo)
                showRoute([driverLat, driverLng], [23.8000, 90.4000]); 
            });
        }

        function showRoute(start, end) {
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(start), L.latLng(end)],
                routeWhileDragging: false
            }).addTo(map);
        }

        // Complete Ride
        document.getElementById('btn-complete').onclick = () => {
            update(ref(db, 'rides/' + currentRideId), { status: 'completed' });
            alert("Ride Finished! Earning Added.");
            location.reload(); 
        };

    </script>
</body>
</html>
